body:
  text: 周生子要論御馬失節其車是碎御天下失節四海失墜桀紂是湯武之梯秦項是大漢之階四逆不興則四順不昇馬總意林卷五賢哲不可以色貌誘之猶張羅恤鳳施穽誘麟伯樂相馬取之于瘦聖人相士取之于疏意林卷五聽訟不如使勿訟善斷不如使勿亂理天綱仗八柄運元象撮眾有者天子也撫人物參天意者三公也執分節事修理者士也臨死修善于計已晚事迫乃歸于救已微有階者易成基無因者難成時鳩傅隼翼羔披豹皮類似質違表是裏非人者天之舌物者神之口天高地厚報應故晚辭者主之弓弩教者君之機關矜賞若春重罰若秋行禮若火流教若水讓一得百爭十失九並同上天無私覆地無私載日月無私照子賢則流不賢禪人道無私也禮曰奉三無私以勞天下也虞世南北堂書鈔卷三十七夫獦葉之風不應八節歐陽詢藝文類聚卷一太平御覽卷九天下所以平者政平也政所以平者人平也人所以平者心平也心所以平者衡平也衡所以平者銖兩平也銖兩所以平者毫釐平也無所不均也無所不平也謂之太平夫天之於物無所偏阿君之散恩無所外內藝文類聚卷二十二引首三句太平御覽卷四百二十九引全節作政所以平者心平也口者言之門脣者舌之藩齒者脣之合也故子貢曰駟不及舌白居易六帖舌部又脣部引脣者舌之藩句仁如春風惠如冬日太平御覽卷二十居堯舜之位而不行唐虞之政者猶反衣狐白步牽騄耳太平御覽卷七十七舜嘗駕五龍以騰唐衢武嘗服九駮以馳文塗此上御也太平御覽卷八十一人君其尊賢矣音聲振於金玉咳唾甘於醴皇太平御覽卷三百八十七行賞不洽於人是春半生也行罰不威是秋半死也半生之春不洽於仁半死之秋不專於義太平御覽卷六百三十三庖饌班錯所享不過一味華蓋結駟列道警蹕其榮不過容膝太平御覽卷六百八十昔伊尹操商栝姬公揮周機管子執齊鉞范蠡奮越椎太平御覽卷七百六十三夫忠謇朝之杷朳正人國之掃篲也秉杷執篲除凶掃穢國之福主之利也太平御覽卷七百六十五
